<!DOCTYPE html>

<style>

.content{
  margin: auto;
  width: 1000px;
  height: 500px;
}

.grid-container {
  display: grid;
  grid-template-columns: repeat(5, minmax(200px, 1fr)) repeat(6, minmax(200px, 1fr));
  grid-template-rows: repeat(2, 100px);
  grid-gap: 10px; 
}

.grid-item {
  position: relative;
  width: auto;
}

.grid-item img {
  width: 100%;
  height: 200px;
}

.grid-container > div:nth-child(-n+5) {
  grid-row: 1;
}

.grid-container > div:nth-child(n+6):nth-child(-n+11) {
  grid-row: 2;
}

.grid-container > div:nth-child(n+12) {
  grid-row: 3;
}



    #sample-pic img:hover{
