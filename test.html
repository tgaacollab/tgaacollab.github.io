.grid-container {
  display: grid;
  grid-template-columns: repeat(7, minmax(100px, 1fr));
  grid-template-rows: repeat(6, 100px);
  grid-gap: 10px; 
}

.grid-item {
  position: relative;
  width: 100px;
}

.grid-blank {
  position: relative;
  width: 100px;
}

.grid-item img {
  width: 300px;
}

.grid-container > div:nth-child(-n+7) {
  grid-row: 1;
}

.grid-container > div:nth-child(n+8):nth-child(-n+14) {
  grid-row: 2;
}

.grid-container > div:nth-child(n+15):nth-child(-n+21) {
  grid-row: 3;
}

.grid-container > div:nth-child(n+22):nth-child(-n+28) {
  grid-row: 4;
}

.grid-container > div:nth-child(n+29):nth-child(-n+35) {
  grid-row: 5;
}

.grid-container > div:nth-child(n+36) {
  grid-row: 6;
}

    #sample-pic img:hover{
        content:url(sample_b.png);
    }

    @media (max-width: 1080px) {

      .grid-container {
        display: grid;
        grid-template-columns: repeat(5, minmax(100px, 1fr));
        grid-template-rows: repeat(6, 100px);
        grid-gap: 10px; 
      }

      .grid-container > div:nth-child(-n+5) {
        grid-row: 1;
      }

      .grid-container > div:nth-child(n+6):nth-child(-n+10) {
        grid-row: 2;
      }

      .grid-container > div:nth-child(n+11):nth-child(-n+15) {
        grid-row: 3;
      }

      .grid-container > div:nth-child(n+16):nth-child(-n+20) {
        grid-row: 4;
      }

      .grid-container > div:nth-child(n+21):nth-child(-n+25) {
        grid-row: 5;
      }

      .grid-container > div:nth-child(n+26) {
        grid-row: 6;
      }
}
