<style>

  /* HOVER */

    #ryunosuke img:hover{
        content:url("https://files.catbox.moe/9d0m0a.png");
    }

    #susato img:hover{
        content:url("https://files.catbox.moe/oms1ro.png");
    }

    #kazuma img:hover{
        content:url("https://files.catbox.moe/knuy5r.png");
    }

.content{
  transform: translateY(1em);
  width: 100%;

}

.chara-container {
  display: grid;
  grid-template-columns: repeat(15);
  grid-template-rows: repeat(8, 80px);
  justify-content: center;

}

.chara-item {
  position: relative;
  width: 100px;
  cursor: pointer;
}

.chara-blank {
  position: relative;
  width: 100px;
}

.chara-item img {
  height: 350px;
  pointer-events: auto;
  position: absolute;
  top: 0px; left: -50px;
  z-index: 2;
  -webkit-transform: scale(1);
  transform: scale(1);
  -webkit-transition: .3s ease-in-out;
  transition: .3s ease-in-out;
  -webkit-filter: drop-shadow(5px 5px 5px rgba(0, 0, 0, 0.25));
  filter: drop-shadow(5px 5px 5px rgba(0, 0, 0, 0.25));
}

.chara-item:hover img{
        -webkit-transform: scale(1.1);
	    transform: scale(1.05);
      -webkit-filter: drop-shadow(0px 0px 5px #ec9718);
  filter: drop-shadow(0px 0px 5px #ec9718);
    }

.chara-container > div:nth-child(-n+15) {
  grid-row: 1;
}

.chara-container > div:nth-child(n+16):nth-child(-n+30) {
  grid-row: 2;
}

.chara-container > div:nth-child(n+31):nth-child(-n+45) {
  grid-row: 3;
}

.chara-container > div:nth-child(n+46):nth-child(-n+60) {
  grid-row: 4;
}

.chara-container > div:nth-child(n+61):nth-child(-n+75) {
  grid-row: 5;
}

.chara-container > div:nth-child(n+76):nth-child(-n+90) {
  grid-row: 6;
}

.chara-container > div:nth-child(n+91):nth-child(-n+105) {
  grid-row: 7;
}

.chara-container > div:nth-child(n+106):nth-child(-n+120) {
  grid-row: 8;
}



    @media (max-width: 1080px) {
      .desktop-only{
        display: none;
      }

      .chara-container {
