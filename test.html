<style>

.content{
  margin: auto;
  width: 90%;

}

.grid-container {
  display: grid;
  grid-template-columns: repeat(15);
  grid-template-rows: repeat(8, 80px);
  justify-content: center; /* add this line to center the grid horizontally */
}

.grid-item {
  position: relative;
  width: 100px;
}

.grid-blank {
  position: relative;
  width: 100px;
}

.grid-item img {
  width: 200px;
}

.grid-container > div:nth-child(-n+15) {
  grid-row: 1;
}

.grid-container > div:nth-child(n+16):nth-child(-n+30) {
  grid-row: 2;
}

.grid-container > div:nth-child(n+31):nth-child(-n+45) {
  grid-row: 3;
}

.grid-container > div:nth-child(n+46):nth-child(-n+60) {
  grid-row: 4;
}

.grid-container > div:nth-child(n+61):nth-child(-n+75) {
  grid-row: 5;
}

.grid-container > div:nth-child(n+76):nth-child(-n+90) {
  grid-row: 6;
}

.grid-container > div:nth-child(n+91):nth-child(-n+105) {
  grid-row: 7;
}

.grid-container > div:nth-child(n+106):nth-child(-n+120) {
  grid-row: 8;
}

    #sample-pic img:hover{
        content:url(sample_b.png);
    }

    @media (max-width: 1080px) {

      .desktop-only{
        display: none;
      }

      .content{
        margin: auto;
        width: 95%;
      }

      .grid-container {

      width: 50px;

    .grid-blank {

      width: 50px;
